name: Build MSurvivalRanks

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Verify Maven
        run: mvn --version

      - name: Build Plugin
        run: mvn clean package

      - name: Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: MSurvivalRanks
          path: target/*.jar
          if-no-files-found: error
